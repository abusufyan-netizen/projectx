name: 🚀 Deploy to InfinityFree

on:
  push:
    branches: [ main ]

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: 🛠️ Create Config file from Secrets
      run: |
        cat <<EOF > src/Core/Config.php
        <?php
        namespace Hub\Core;
        class Config {
            const DB_HOST = '${{ secrets.DB_HOST }}'; 
            const DB_NAME = '${{ secrets.DB_NAME }}'; 
            const DB_USER = '${{ secrets.DB_USER }}'; 
            const DB_PASS = '${{ secrets.DB_PASS }}'; 
            const SITE_NAME = 'Leads Academic Hub';
            const BASE_URL = '';
            const UPLOAD_DIR = __DIR__ . '/../../storage/uploads/';
            const ALLOWED_EXTENSIONS = ['pdf', 'docx', 'pptx'];
            const MAX_FILE_SIZE = 15728640;
        }
        EOF

    - name: 📂 Sync files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: ./htdocs/
